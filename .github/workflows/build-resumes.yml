name: Build Resume PDFs

on:
  push:
    paths:
      - "resumes/*.tex"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Compile Backend Resume
        run: |
          pdflatex -interaction=nonstopmode resumes/backend_resume.tex
          mv backend_resume.pdf Akash_Backend_Developer.pdf

      - name: Compile Fullstack Resume
        run: |
          pdflatex -interaction=nonstopmode resumes/fullstack_resume.tex
          mv fullstack_resume.pdf Akash_Fullstack_Developer.pdf

      - name: Compile Software Engineer Resume
        run: |
          pdflatex -interaction=nonstopmode resumes/software_engineer_resume.tex
          mv software_engineer_resume.pdf Akash_Software_Engineer.pdf

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: |
            Akash_Backend_Developer.pdf
            Akash_Fullstack_Developer.pdf
            Akash_Software_Engineer.pdf